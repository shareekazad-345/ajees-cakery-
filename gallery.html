<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ajees | Sweet Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="bg-[#F8F3E6] text-[#5C554B] font-['Inter'] antialiased overflow-x-hidden min-h-screen flex flex-col">

<!-- Minimal Navigation -->
<!-- NAVIGATION -->
<nav data-aos="fade-down" class="absolute top-0 left-0 w-full z-50 flex justify-between items-center px-8 py-8 text-[#747A59]">
    <a href="/index.html" class="text-4xl font-['Playfair_Display'] font-bold tracking-widest uppercase hover:text-[#D9A0A0] transition-colors relative z-50">
        AJEES
    </a>

    <!-- Desktop Menu (Hidden on Mobile) -->
    <div class="hidden md:flex gap-10 font-medium tracking-widest text-xs uppercase">
        <a href="/index.html#home" class="hover:text-[#D9A0A0] transition-colors duration-300">Home</a>
        <a href="/gallery.html" class="hover:text-[#D9A0A0] transition-colors duration-300">Portfolio</a>
        <a href="/index.html#patisserie" class="hover:text-[#D9A0A0] transition-colors duration-300">Patisserie</a>
        <a href="/contact.html" class="hover:text-[#D9A0A0] transition-colors duration-300">Contact</a>
    </div>

    <!-- Mobile Hamburger Button (Hidden on Desktop) -->
    <button id="mobile-menu-btn" class="md:hidden flex flex-col gap-1.5 z-50 relative focus:outline-none">
        <span class="w-6 h-0.5 bg-[#747A59] transition-all duration-300" id="bar1"></span>
        <span class="w-6 h-0.5 bg-[#747A59] transition-all duration-300" id="bar2"></span>
        <span class="w-6 h-0.5 bg-[#747A59] transition-all duration-300" id="bar3"></span>
    </button>
</nav>

<!-- Mobile Full-Screen Menu Overlay -->
<div id="mobile-menu" class="fixed inset-0 bg-[#F8F3E6] z-40 flex flex-col items-center justify-center gap-8 translate-x-full transition-transform duration-500 md:hidden">
    <a href="/index.html#home" class="text-3xl font-['Playfair_Display'] text-[#747A59] hover:text-[#D9A0A0] mobile-link">Home</a>
    <a href="/gallery.html" class="text-3xl font-['Playfair_Display'] text-[#747A59] hover:text-[#D9A0A0] mobile-link">Portfolio</a>
    <a href="/index.html#patisserie" class="text-3xl font-['Playfair_Display'] text-[#747A59] hover:text-[#D9A0A0] mobile-link">Patisserie</a>
    <a href="/contact.html" class="text-3xl font-['Playfair_Display'] text-[#D9A0A0] font-bold mobile-link">Inquire Now</a>
</div>

<!-- Header Section -->
<header class="text-center pt-10 pb-16 relative">
      <span class="absolute top-0 left-1/2 -translate-x-1/2 text-6xl md:text-7xl font-['Great_Vibes'] text-[#D9A0A0] opacity-50 w-full z-0">
        Artistry in Baking
      </span>
    <h1 class="text-4xl md:text-5xl font-['Playfair_Display'] font-bold text-[#747A59] relative z-10">
        Our Portfolio
    </h1>
</header>

<!-- Filters Container (Empty because JS will fill it!) -->
<div id="filter-container" class="flex flex-wrap justify-center gap-3 px-6 mb-16 relative z-10">
    <!-- Buttons will magically appear here -->
</div>

<!-- Masonry Gallery Grid (Empty because JS will fill it!) -->
<main id="gallery-grid" class="max-w-7xl mx-auto columns-1 sm:columns-2 lg:columns-3 xl:columns-4 gap-6 space-y-6 px-6 pb-24 flex-grow">
    <!-- Cake cards will magically appear here -->
</main>

<!-- The Fullscreen Lightbox Modal (Hidden by default) -->
<div id="lightbox" class="fixed inset-0 z-50 bg-[#3A4D39]/95 backdrop-blur-md hidden flex-col items-center justify-center opacity-0 transition-opacity duration-500">

    <!-- Close Button -->
    <button id="close-lightbox" class="absolute top-8 right-8 text-[#F8F3E6] hover:text-[#D9A0A0] transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>

    <!-- Lightbox Image Container -->
    <div class="relative w-full max-w-4xl max-h-[80vh] flex items-center justify-center px-4">

        <!-- Previous Button -->
        <button id="prev-btn" class="absolute left-4 md:-left-12 text-[#F8F3E6] hover:text-[#D9A0A0] transition-colors p-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>

        <!-- The actual clicked Image -->
        <img id="lightbox-img" src="" alt="Gallery Image" class="max-w-full max-h-[80vh] object-contain rounded-lg shadow-2xl border-4 border-[#F8F3E6]/20" />

        <!-- Next Button -->
        <button id="next-btn" class="absolute right-4 md:-right-12 text-[#F8F3E6] hover:text-[#D9A0A0] transition-colors p-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>

    </div>

    <!-- Image Title inside Lightbox -->
    <h3 id="lightbox-caption" class="text-[#F8F3E6] font-['Playfair_Display'] text-2xl mt-6 italic"></h3>

</div>

<!-- Linking our new Gallery Logic file (We will create this next!) -->
<script type="module" src="./js/gallery.js"></script>
</body>
</html>
